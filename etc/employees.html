<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="https://calape.ph/assets/calape.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/5.6.0/css/tabulator.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/5.6.0/js/tabulator.min.js"></script>
<title>...</title>
<style>
body {
	font-family: arial;
	margin: 0;
	padding: 0;
}

#filter {
	padding: 10px;
	height: 38px;
}

#filter select {
	font-size: 16px;
	padding: 7px 10px;
	border: 1px solid #888;
}

#filter input {
	border: 1px solid #888;
	font-size: 16px;
	line-height: 30px;
	padding: 2px 10px;
}

.right {
	float: right;
}

[tabulator-field="firstname"],[tabulator-field="lastname"],
[tabulator-field="department"],[tabulator-field="status"] {
	text-transform: uppercase;
}

img {
	animation: ani 6s infinite;
	height: 50px;
	margin-top: -5px;
}

@keyframes ani {
	0% {
		transform: translateX(0);
	}

	20% {
		transform: rotateX(180deg);
	}
	
	50% {
		transform: translateX(500px);
	}

	80% {
		transform: rotateY(180deg);
	}

	100% {
		transform: translateX(0);
	}
}

@media (max-width: 900px) {
	img {
		display: none;
	}
}

button {
	border: 1px solid #888;
	font-size: 16px;
	padding: 7px 4px;
	text-transform: uppercase;
	cursor: pointer;
}

button:hover {
	background: #ddd;
}
</style>
</head>
<body>
<div id="filter">
	<img src="https://calape.ph/assets/calape.svg">
	<div class="right">
		<input type="text" placeholder="Look for ...">
		<select>
			<option>First Name</option>
			<option>Last Name</option>
			<option>Department</option>
			<option>ID</option>
		</select>
		<button id="print">print</button>
	</div>
</div>
<div id="masterlist"></div>
<script>
var table = new Tabulator("#masterlist", {
		ajaxURL: "https://dtr.calape.ph/api/employees.php",
		printAsHtml: true,
    placeholder:"No Data Set",
    layout:"fitColumns",
    columns:[
				{title:"ID", field:"id", sorter:"number", width:80},
        {title:"First Name", field:"firstname", sorter:"string"},
        {title:"Last Name", field:"lastname", sorter:"string"},
        {title:"Department", field:"department", sorter:"string"},
        {title:"Status", field:"status", sorter:"string"},
    ],
});

const query = document.querySelector('#filter input'),
			filter = document.querySelector('#filter select'),
			pprint = document.querySelector('#print');

function lookup() {
	var f = filter.value.replace(/\W/g,'').toLowerCase(),
			q = query.value;

	!q && table.clearFilter();

	table.setFilter(f,'like',q);
}

query.addEventListener('keyup', lookup);
filter.addEventListener('change', lookup);
pprint.addEventListener('click', () => {
	table.print()
});
</script>
</body>
</html>
