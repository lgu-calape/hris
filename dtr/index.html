<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@1.4.4/css/pico.min.css">
  <link rel="icon" type="image/png" href="/assets/calape.svg">
  <title>Daily Time Records</title>
  <style>
    article {
      font-family: 'ADLaM Display', sans-serif;
    }

    input {
      text-transform: uppercase;
    }

    #mainx {
      max-width: 450px;
    }

    .version {
      color: #eee;
      font-size: 10px;
      text-align: center;
			margin-top: 3em;
    }

		footer {
			text-align: center;
		}

		footer a {
			font-size: 0.91em;
			padding: 0 5px;
		}
  </style>
</head>

<body>
  <main class="container" id="mainx">
    <article>
      <input type="text" id="employee_id" placeholder="employee id" autofocus>
			<div style="display:none;">
      <button id="btn0">VIEW DTR</button>
      <button id="btn4" style="background-color:red;border-color:red;display:none;">NEW DTR SELECTION</button>
      <button id="btn3" class="outline">MONITOR</button>
      <hr>
      <button id="btn1" class="secondary outline">REGISTER</button>
      <button id="btn2" class="secondary outline">REG.CODE</button>
			</div>
    </article>
		<hr>
		<footer>
	    <a href="monitor.html">MONITOR</a>
   		<a href="register.html">REGISTER</a>
  	  <a href="upload.html">UPLOAD</a>
		</footer>
		<hr>
    <p class="version">rev.1705572093</p>
  </main>
  <script src="helper.js"></script>
  <script>
    const YM = new Date(), EID = document.getElementById('employee_id');

    function verify(ID) {
      if (ID < 1001 || ID > 9999) {
        EID.ariaInvalid = true;
        return;
      }

			EID.ariaBusy = true;

      let x = new XMLHttpRequest();

      x.addEventListener('readystatechange', () => {
        if (x.readyState === 4) {
          if (x.status !== 200) {
	          EID.ariaInvalid = true;
						EID.removeAttribute('aria-busy');
						return;
					}

					if ( window.innerWidth < 1040 ) {
						location.replace(`mobile.html?ID=${ID}&YY=${YM.getFullYear()}&MM=${YM.getMonth()+1}`);
						return;
					}

					location.replace(`regular.html?ID=${ID}&YY=${YM.getFullYear()}&MM=${YM.getMonth()+1}`);
        }
      });

      x.open('GET', 'https://dtr.calape.ph/api/employee_basic_info.php?ID=' + ID);
      x.send();
    }

    function redirect(l) {
      location.assign(l);
    }

    EID.addEventListener('keyup', (e) => {
			EID.removeAttribute('aria-invalid');

			if ( e.target.value.length > 4 )
				e.target.value = '';

			if ( e.target.value.length !== 4 )
				return;

      verify(e.target.value);
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (new Date().getTimezoneOffset() != -480) {
        alert_("YOUR COMPUTER HAS INCORRECT TIMEZONE",0,21e6);
        mainx.remove();
      }
    });
  </script>
</body>
</html>
